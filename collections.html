<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop KaySneakers collections — Sneakers, Boots, Loafers. Premium hybrid footwear.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Collections — KaySneakers</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/collection.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/polish.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo">KAYSNEAKERS</a>
      <nav class="header__nav">
        <a href="collections.html?c=sneakers" class="nav__link">Sneakers</a>
        <a href="collections.html?c=boots" class="nav__link">Boots</a>
        <a href="collections.html?c=loafers" class="nav__link">Loafers</a>
        <a href="collections.html?c=accessories" class="nav__link">Accessories</a>
      </nav>
      <div class="header__actions">
        <button class="search-trigger" aria-label="Search">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <a href="cart.html" class="cart-trigger"><span class="cart-trigger__count" id="cartCount"></span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <button class="menu-toggle" aria-label="Menu" id="menuToggle">☰</button>
      </div>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="collections.html?c=sneakers">Sneakers</a>
    <a href="collections.html?c=boots">Boots</a>
    <a href="collections.html?c=loafers">Loafers</a>
    <a href="size-guide.html">Size Guide</a>
    <a href="fit-guarantee.html">Fit Guarantee</a>
  </nav>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-overlay__inner">
      <input type="search" class="search-overlay__input" placeholder="Search shoes, collections..." id="searchInput" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <main id="main" class="collection-page">
    <div class="container">
      <div class="collection-header">
        <h1 id="collectionTitle">All Products</h1>
        <p class="text-secondary" id="collectionCount">8 products</p>
        <div class="collection-filters">
          <select class="input collection-sort" id="sortSelect">
            <option value="featured">Featured</option>
            <option value="newest">Newest</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
      </div>
      <div class="product-grid stagger-children" id="collectionGrid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__grid">
      <div class="footer__brand">
        <div class="footer__logo">KAYSNEAKERS</div>
        <p class="footer__tagline">Premium hybrid footwear. Work to Walk.</p>
      </div>
      <div class="footer__column">
        <h4>Shop</h4>
        <ul>
          <li><a href="collections.html?c=sneakers">Sneakers</a></li>
          <li><a href="collections.html?c=boots">Boots</a></li>
          <li><a href="collections.html?c=loafers">Loafers</a></li>
        </ul>
      </div>
      <div class="footer__column">
        <h4>Support</h4>
        <ul>
          <li><a href="size-guide.html">Size Guide</a></li>
          <li><a href="fit-guarantee.html">Fit Guarantee</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <div class="chat-widget">
    <button class="chat-widget__trigger" aria-label="Sizing help">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Need sizing help?</span>
    </button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/collection.js"></script>
  <script src="js/common.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
