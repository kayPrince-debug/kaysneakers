<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — KaySneakers</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/polish.css">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo">KAYSNEAKERS</a>
      <nav class="header__nav">
        <a href="collections.html?c=sneakers">Sneakers</a>
        <a href="collections.html?c=boots">Boots</a>
        <a href="collections.html?c=loafers">Loafers</a>
      </nav>
      <div class="header__actions">
        <a href="cart.html" class="cart-trigger"><span class="cart-trigger__count" id="cartCount"></span>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <button class="menu-toggle" id="menuToggle">☰</button>
      </div>
    </div>
  </header>

  <a href="#main" class="skip-link">Skip to main content</a>
  <main id="main" class="cart-page">
    <div class="container">
      <h1>Shopping Cart</h1>
      <div class="cart-layout" id="cartLayout">
        <!-- Filled by JS -->
      </div>
      <div class="cart-empty" id="cartEmpty" style="display:none;">
        <p>Your cart is empty.</p>
        <a href="collections.html?c=sneakers" class="btn btn-primary">Continue Shopping</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__grid">
      <div class="footer__brand">
        <div class="footer__logo">KAYSNEAKERS</div>
        <p class="footer__tagline">Premium hybrid footwear. Work to Walk.</p>
      </div>
      <div class="footer__column">
        <h4>Support</h4>
        <ul>
          <li><a href="fit-guarantee.html">Fit Guarantee</a></li>
          <li><a href="returns-shipping.html">Returns & Shipping</a></li>
        </ul>
      </div>
    </div>
    <div class="footer__bottom">
      <div class="footer__bottom-inner">
        <span class="tiny" style="color:var(--light-gray)">Secure checkout · Visa · Mastercard · Amex · PayPal</span>
      </div>
    </div>
  </footer>

  <div class="chat-widget">
    <button class="chat-widget__trigger" aria-label="Sizing help">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Need sizing help?</span>
    </button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
</body>
</html>
